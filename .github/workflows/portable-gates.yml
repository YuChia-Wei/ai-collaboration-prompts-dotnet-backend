name: Portable AI Context Gates

on:
  pull_request:
    paths:
      - ".ai/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".dev/assessments/**"
      - ".dev/backlog/**"
      - ".dev/standards/**"
      - ".dev/workflows/**"
      - ".github/agents/**"
      - ".github/workflows/**"
      - "tools/**"
      - "global.json"
      - "requirements.txt"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quick:
    name: Ubuntu quick gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out the candidate tree
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pinned Python dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Set up .NET from global.json
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run the governed quick gate
        shell: bash
        run: bash .ai/scripts/check-all.sh --quick
