name: Package AI Context Candidate

on:
  pull_request:
    paths:
      - ".ai/distribution/**"
      - ".ai/scripts/**"
      - ".dev/releases/**"
      - ".github/workflows/package-candidate.yml"
      - ".github/workflows/publish-release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Governed candidate version in vMAJOR.MINOR.PATCH form"
        required: true
        type: string

permissions: {}

jobs:
  package:
    name: Build and validate candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out candidate commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging dependency
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Resolve candidate and render release body
        id: release
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set +e
          args=(
            --commit "${GITHUB_SHA}"
            --mode candidate
            --output "${RUNNER_TEMP}/release-body.md"
            --github-output "${GITHUB_OUTPUT}"
          )
          if [[ -n "${REQUESTED_VERSION}" ]]; then
            args+=(--version "${REQUESTED_VERSION}")
          fi
          render_output="$(python .ai/scripts/render-ai-context-release-notes.py "${args[@]}" 2>&1)"
          render_status=$?
          set -e
          if [[ ${render_status} -ne 0 ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "pull_request" \
              && -z "${REQUESTED_VERSION}" \
              && "${render_output}" == *"candidate discovery requires exactly one governed planned or validated release; found none"* ]]; then
              echo "available=false" >> "${GITHUB_OUTPUT}"
              echo "::notice::No governed release candidate exists; packaging is not applicable to this pull request."
              exit 0
            fi
            printf '%s\n' "${render_output}" >&2
            exit "${render_status}"
          fi
          printf '%s\n' "${render_output}"
          echo "available=true" >> "${GITHUB_OUTPUT}"

      - name: Validate release registry
        if: steps.release.outputs.available == 'true'
        run: python .ai/scripts/validate-ai-context-versions.py --no-git

      - name: Validate exact candidate state
        if: steps.release.outputs.available == 'true'
        run: |
          python .ai/scripts/validate-ai-context-release-state.py \
            --phase candidate \
            --version "${{ steps.release.outputs.version }}" \
            --commit "${GITHUB_SHA}" \
            --branch "${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

      - name: Build deterministic archives
        if: steps.release.outputs.available == 'true'
        env:
          MIGRATION_SOURCES: ${{ steps.release.outputs.migration_sources }}
        run: |
          build_args=(
            --ref "${GITHUB_SHA}"
            --version "${{ steps.release.outputs.version }}"
            --output dist
          )
          for migration_source in ${MIGRATION_SOURCES}; do
            previous_version="${migration_source#v}"
            previous_output="${RUNNER_TEMP}/previous-package-${previous_version}"
            previous_extract="${RUNNER_TEMP}/previous-extracted-${previous_version}"
            python .ai/scripts/build-ai-context-package.py \
              --ref "refs/tags/${migration_source}" \
              --version "${migration_source}" \
              --output "${previous_output}"
            python -m zipfile -e \
              "${previous_output}/ai-context-dotnet-backend-v${previous_version}.zip" \
              "${previous_extract}"
            build_args+=(
              --migration-source "${migration_source}" \
                "${previous_extract}/ai-context-dotnet-backend-v${previous_version}/metadata/files.yaml"
            )
          done
          python .ai/scripts/build-ai-context-package.py "${build_args[@]}"

      - name: Validate archives and parity
        if: steps.release.outputs.available == 'true'
        run: |
          python .ai/scripts/validate-ai-context-package.py \
            "dist/${{ steps.release.outputs.package_id }}.zip" \
            "dist/${{ steps.release.outputs.package_id }}.tar.gz"

      - name: Upload candidate artifact
        if: steps.release.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.package_id }}-${{ github.sha }}
          retention-days: 14
          compression-level: 0
          if-no-files-found: error
          path: |
            dist/${{ steps.release.outputs.package_id }}.zip
            dist/${{ steps.release.outputs.package_id }}.zip.sha256
            dist/${{ steps.release.outputs.package_id }}.tar.gz
            dist/${{ steps.release.outputs.package_id }}.tar.gz.sha256
            ${{ runner.temp }}/release-body.md
