asset_id: "ai-context-governance"
schema_version: "1.0"
asset_type: "skill-spec"
title: "AI Context Governance"
purpose: "Govern AI collaboration context boundaries, semantic customization records, skill routing, runtime wrapper sync, AI context migration, and audit-to-remediation lifecycles without performing product feature implementation."
portability: "portable"
audience: "agent-facing"
source_of_truth: "canonical"
triggers:
  - "AI context governance"
  - "context cleanup"
  - "prompt boundary"
  - "skill routing cleanup"
  - "documentation governance"
  - "language policy"
  - "wrapper sync"
  - "AI context audit remediation"
  - "post-remediation AI context audit"
  - "assessment finding remediation"
  - "verification assessment coordination"
  - "record semantic customization"
  - "reconcile target customization"
inputs:
  - "AI context files under .ai, .agents, .claude, and .dev"
  - "workflow plan or task JSON for context cleanup"
  - "baseline assessment and selected stable finding references"
  - "desired universal versus tech-stack-specific boundary"
  - "language and audience constraints"
outputs:
  - "context classification"
  - "boundary policy updates"
  - "language policy updates"
  - "skill routing and wrapper sync updates"
  - "migration plan or completed context move batch"
  - "AI context maintenance workflow linked to baseline and verification assessments with remediation and closure evidence"
  - "remediation report under the owning workflow artifact root"
  - "assessment relationships linking baseline, workflow, and independent verification"
  - "machine-readable receiving checkpoint for cross-model, runtime, host, machine, or fresh-session handoff"
  - "owner-approved semantic customization ledger entries"
constraints:
  - "Do not use this skill for BDD scenario design"
  - "Do not use this skill for production code implementation"
  - "Do not redesign domain architecture unless asked to coordinate with an architecture skill"
  - "Keep runtime wrappers thin and point them to canonical specs"
  - "Prefer folder placement over per-file metadata for context classification"
  - "Keep ai-context-auditor read-only and use it for baseline and post-remediation verification"
  - "Do not overwrite or copy the baseline assessment report during remediation"
  - "Use workflow ids in YYYY-MM-DD-topic[-NN] form and ISO 8601 timestamps with an explicit offset"
  - "Create or switch to a dedicated workflow branch before workflow artifacts or material AI-context edits; do not use main as the active workflow branch"
  - "Treat pre-completion merge or push as a checkpoint and preserve active/pending state; use --no-ff for merges unless another strategy is explicitly requested"
  - "Treat optional indexes, code graphs, MCP servers, IDE indexes, and semantic search only as discovery accelerators; verify material context decisions with repository-native evidence under AICTX-EVIDENCE-001."
  - "Require WORKFLOW-HANDOFF-POLICY for cross-model, runtime, host, machine, or fresh-session continuation; never normalize provider-native Git attribution without real provider fixtures."
  - "Own `.dev/ai-context/customizations.yaml`; identify capability, rule, or contract before supporting paths and follow the shared semantic customization lifecycle."
workflow:
  - step: 1
    description: "Classify context by audience, scope, language, and action, or intake an ai-context-auditor baseline assessment; when workflow mode applies, create or switch to the dedicated branch before artifacts or material edits"
  - step: 2
    description: "Check context placement against boundary and language policies, then triage findings into remediation tasks"
  - step: 3
    description: "Plan or execute the smallest safe policy, routing, wrapper, or move batch; record semantic customizations and explicit owner reconciliation without inferring intent from paths"
  - step: 4
    description: "Update indexes and task results, then validate references and request a read-only post-remediation verification assessment"
  - step: 5
    description: "Compare the baseline and verification assessments, publish the workflow remediation report, create a receiving checkpoint when continuation crosses an execution boundary, and close or defer each finding explicitly"
references:
  - ".dev/standards/ASSESSMENT-ARTIFACT-POLICY.md"
  - ".dev/standards/WORKFLOW-HANDOFF-POLICY.md"
  - ".ai/assets/skills/ai-context-governance/references/context-boundary-playbook.md"
  - ".ai/assets/skills/ai-context-governance/references/language-policy-playbook.md"
  - ".ai/assets/skills/ai-context-governance/references/workflow-and-commit-playbook.md"
  - ".ai/assets/skills/ai-context-governance/references/output-contract.md"
  - ".ai/assets/skills/ai-context-governance/references/audit-remediation-lifecycle.md"
  - ".ai/assets/skills/ai-context-governance/references/semantic-customization-lifecycle.md"
  - ".ai/assets/skills/ai-context-governance/templates/customizations.schema.yaml"
examples:
  - ".dev/guides/ai-collaboration-guides/AI-CONTEXT-GOVERNANCE-SKILL-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/AI-CONTEXT-GOVERNANCE-SKILL-GUIDE.md"
workflow_templates:
  locator: ".ai/assets/skills/ai-context-governance/templates/workflow-locator-template.yaml"
  plan: ".ai/assets/skills/ai-context-governance/templates/ai-context-maintenance-workflow-plan-template.md"
  task: ".ai/assets/skills/ai-context-governance/templates/ai-context-remediation-task-template.json"
  handoff: ".ai/assets/skills/ai-context-governance/templates/workflow-handoff-checkpoint-template.yaml"
report_templates:
  remediation: ".ai/assets/skills/ai-context-governance/templates/ai-context-remediation-report-template.md"
wrapper_targets:
  - "claude"
  - "codex"
wrapper_metadata:
  claude:
    wrapper_path: ".claude/skills/ai-context-governance/"
  codex:
    wrapper_path: ".agents/skills/ai-context-governance/"
status: "active"
