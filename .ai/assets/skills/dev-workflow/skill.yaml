asset_id: "dev-workflow"
asset_type: "skill-spec"
title: "Development Workflow"
purpose: "Coordinate multi-stage development, documentation, refactoring, and AI collaboration work by deciding direct mode versus workflow mode, creating or updating workflow artifacts, routing stages to the right skills, and enforcing validation and commit checkpoints."
portability: "universal"
audience:
  - "AI agents coordinating repository work"
  - "Humans asking agents to plan, stage, or execute multi-skill work"
source_of_truth:
  - ".dev/standards/WORKFLOW-GATE-POLICY.md"
  - ".dev/standards/GIT-COMMIT-POLICY.md"
  - ".ai/assets/skills/README.MD"
triggers:
  - "dev workflow"
  - "development workflow"
  - "workflow orchestration"
  - "skill orchestration"
  - "coordinate skills"
  - "drive other skills"
  - "stage this work"
  - "plan and execute this workflow"
  - "multi-skill handoff"
inputs:
  - "user goal and explicit constraints"
  - "current repository state and git status"
  - "applicable workflow gate and commit policy"
  - "current workflow artifacts, if any"
  - "canonical skill registry and relevant skill specs"
  - "issue number, branch policy, validation expectations, and handoff requirements when provided"
outputs:
  - "direct-mode or workflow-mode decision"
  - "selected skill routing plan"
  - "workflow plan and task artifacts when workflow mode applies"
  - "stage status, validation checkpoints, and commit timing recommendations"
  - "handoff packet for downstream skills or sub-agents"
  - "final execution summary with validation evidence and remaining decisions"
constraints:
  - "Do not replace downstream domain skills; delegate architecture, implementation, review, requirement, spec, context governance, or repo initialization work to the matching skill."
  - "Do not use bdd-gwt-test-designer for general workflow governance or AI documentation cleanup."
  - "When workflow mode applies, keep workflow artifacts under .dev/workflows/<workflow-id>/."
  - "Do not scatter workflow artifacts under .ai, .agents/skills, .claude/skills, or arbitrary folders unless the user explicitly requests it."
  - "Preserve user decisions, explicit constraints, branch rules, commit policy, and validation expectations."
  - "Ask the user only for direction decisions that cannot be safely inferred from repository evidence or existing policies."
workflow:
  - step: 1
    description: "Intake the user goal, current repo state, active branch, explicit constraints, and any issue number or commit expectations."
  - step: 2
    description: "Apply the workflow gate to choose direct mode or workflow mode."
  - step: 3
    description: "If workflow mode applies, create or update .dev/workflows/<workflow-id>/workflow-plan.md and task JSON artifacts."
  - step: 4
    description: "Route each stage to the matching skill or sub-agent using the routing playbook."
  - step: 5
    description: "Coordinate stage execution, status updates, validation checkpoints, and commit timing."
  - step: 6
    description: "Close with evidence: changed files, validation, commits, open decisions, and recommended next action."
references:
  - ".ai/assets/skills/dev-workflow/references/routing-playbook.md"
  - ".ai/assets/skills/dev-workflow/references/workflow-artifact-playbook.md"
  - ".ai/assets/skills/dev-workflow/references/output-contract.md"
examples:
  - ".dev/guides/ai-collaboration-guides/DEV-WORKFLOW-SKILL-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/DEV-WORKFLOW-SKILL-GUIDE.md"
wrapper_targets:
  - "claude"
  - "codex"
wrapper_metadata:
  claude:
    wrapper_path: ".claude/skills/dev-workflow/"
  codex:
    runtime_wrapper_path: ".agents/skills/dev-workflow/"
status: "active"
