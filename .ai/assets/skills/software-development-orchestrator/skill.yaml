asset_id: "software-development-orchestrator"
schema_version: "1.0"
asset_type: "skill-spec"
title: "Software Development Orchestrator"
purpose: "Activate from high-level software or product development intent, coordinate the multi-stage lifecycle without requiring skill names, decide direct mode versus workflow mode, create development workflow artifacts, map stages to development capability slots, use local profiles when available, and enforce approval, validation, test, compliance, commit, and closeout checkpoints."
portability: "repo-portable"
audience: "agent-facing"
source_of_truth: "canonical"
capability_slots:
  - "workflow-orchestration"
governance_references:
  - ".dev/standards/WORKFLOW-GATE-POLICY.md"
  - ".dev/standards/WORKFLOW-ARTIFACT-POLICY.md"
  - ".dev/standards/WORKFLOW-HANDOFF-POLICY.md"
  - ".dev/standards/GIT-COMMIT-POLICY.md"
  - ".dev/TEAM-GIT-FLOW-RULES.MD"
  - ".ai/assets/skills/README.MD"
triggers:
  - "a high-level software or product outcome that requires multiple lifecycle stages, even when no skill is named"
  - "plan, design, implement, test, review, and close this software change"
  - "dev workflow"
  - "development workflow"
  - "software development workflow"
  - "product development lifecycle"
  - "plan and execute this development workflow"
  - "multi-stage implementation"
  - "development skill handoff"
inputs:
  - "software or product development goal and explicit constraints"
  - "runtime goal or workflow context when available"
  - "current repository state and git status"
  - "applicable workflow gate and commit policy"
  - "current workflow artifacts, if any"
  - "canonical skill registry and relevant skill specs"
  - "available downstream skill metadata or runtime wrapper descriptions"
  - "issue number, required branch policy, validation expectations, and handoff requirements"
  - "target-owned test commands, working directory, prerequisites, credential requirements or environment boundaries, and test policy when test execution is selected; never secret values"
  - "approval state for requirements, design, specification, implementation, specialized tests, and compliance gates"
outputs:
  - "direct-mode or workflow-mode decision"
  - "capability-slot routing plan"
  - "local skill routing plan when a capability profile exists"
  - "skill discovery result with confidence when routing is inferred"
  - "development workflow plan and task artifacts created from this skill's templates when workflow mode applies"
  - "stage status, validation checkpoints, and commit timing recommendations"
  - "handoff packet for downstream skills or sub-agents"
  - "runtime coordination prompt when the user wants Codex Goal or Claude workflow integration"
  - "fallback checklist when no matching downstream skill or profile is available"
  - "target-selected test execution record with provider, level, command context, and exact outcome"
  - "selectable spec-compliance result: not-applicable when unselected or a 100% fail-closed gate when selected"
  - "final execution summary with separate requirement/spec approval, implementation, test, compliance, review, validation, task, commit, and handoff evidence"
  - "deterministic acceptance evidence from a preclassified input envelope and a repository-verified fresh-session checkpoint"
constraints:
  - "Do not claim standalone fallback output has the same quality as a matching downstream specialist skill or project-specific standard."
  - "Do not replace downstream development skills; delegate requirement, specification, problem framing, architecture, test design, implementation, review, and compliance work to the matching local skill when the profile provides one."
  - "When no matching downstream skill exists, use fallback playbooks only to create a minimum viable checklist, handoff prompt, or quality gate."
  - "When downstream skill mapping is inferred, report confidence and evidence before relying on the route."
  - "Do not make a runtime goal or runtime workflow the source of truth for repository process rules; use runtime features to carry software-development-orchestrator execution."
  - "Do not use this skill to orchestrate AI context audits, AI context governance, documentation-only cleanup, repository initialization, or other non-development maintenance workflows; route those tasks to their owning skill."
  - "When workflow mode applies, follow .dev/standards/WORKFLOW-ARTIFACT-POLICY.md, default artifacts to .dev/workflows/<workflow-id>/, and keep the required locator there when a development workflow declares another repository-relative artifact root."
  - "Do not store runtime workflow artifacts under .ai/assets/skills, .agents/skills, .claude/skills, generated folders, or temporary locations."
  - "Preserve user decisions, explicit constraints, branch rules, commit policy, and validation expectations."
  - "Create or switch to a dedicated workflow branch before creating development workflow artifacts or making material workflow edits; never use main as the active workflow branch."
  - "Treat a requested pre-completion push or merge as a checkpoint and keep pending workflow state active; use --no-ff for merges unless the user explicitly selects another strategy."
  - "Activate from high-level software-development intent; do not require the user to name this skill or downstream skills, and do not derive lifecycle stages from skill names alone."
  - "When a requirement, design, or specification discussion awaits approval, pause before creating or executing implementation work; record the pending decision and resume only after explicit authorization."
  - "Treat test-execution as an optional, unmapped capability contract. Resolve target-profile commands first, then a separately evaluated external skill, then the fallback contract; do not create or assume a dedicated test skill."
  - "For test execution, use target-owned commands, working directory, prerequisites, and policy. Do not invent credentials, bypass controls, or escalate privileges implicitly."
  - "Select unit and integration tests by default. Select E2E, browser, Playwright, and other environment-dependent tests only when target policy, requirements, an approved plan, or the owner requires them."
  - "Record each selected test level as passed, failed, blocked-by-environment, not-applicable, or deferred-with-owner. Blocked-by-environment is never passed, and mandatory selected tests keep closeout open until target policy accepts the outcome."
  - "Treat spec compliance as unselected and not-applicable by default. Once a target profile, problem-frame workflow, requirement, or owner decision selects it, incomplete configuration or coverage below 100% fails closed."
  - "Commit one validated durable stage or coherent bounded batch rather than one commit per skill invocation. Compress only unshared, unpushed history and preserve approval, evidence, review, checkpoint, and handoff boundaries."
  - "Before a fresh-session continuation, use the registered WORKFLOW-HANDOFF-POLICY checkpoint and durable Git, locator, current-task, target-policy, and test-state evidence; hidden conversation context must not be required."
  - "Deterministic activation acceptance begins at a preclassified envelope. Natural-language interpretation and ambiguous intent classification remain model-in-loop EVAL responsibilities; do not claim that the deterministic oracle understands arbitrary prose."
  - "Ask the user only for direction decisions that cannot be safely inferred from repository evidence or existing policies."
workflow:
  - step: 1
    description: "Activate from the high-level software or product development goal without requiring skill names; intake current repo state, active branch, explicit constraints, approval state, and any issue number or commit expectations."
  - step: 2
    description: "Apply the workflow gate to choose direct mode or workflow mode."
  - step: 3
    description: "If workflow mode applies, create or switch to the dedicated workflow branch first, then create or update development workflow artifacts from this skill's templates under the repository-approved artifact root."
  - step: 4
    description: "Map each stage to a generic capability slot, then use the active capability profile or skill discovery playbook to route to a local skill or use a fallback playbook."
  - step: 5
    description: "Coordinate approval pauses, stage execution, target-aware test execution, selectable spec compliance, status updates, validation checkpoints, and one commit per validated durable stage or coherent bounded batch."
  - step: 6
    description: "Before the final response, verify branch and checkpoint state plus the workflow closing checklist, including whether the commit policy requires a commit; then close with separate evidence for approved requirements/specs, implementation, required tests, selected compliance, review, validation, task state, commits, merge/checkpoint state, open decisions, and recommended next action."
references:
  - ".ai/assets/skills/software-development-orchestrator/references/routing-playbook.md"
  - ".ai/assets/skills/software-development-orchestrator/references/skill-discovery-playbook.md"
  - ".ai/assets/skills/software-development-orchestrator/references/capability-profile.md"
  - ".ai/assets/skills/software-development-orchestrator/references/capability-profile.yaml"
  - ".ai/assets/skills/software-development-orchestrator/references/fallback-playbooks.md"
  - ".ai/assets/skills/software-development-orchestrator/references/runtime-coordination.md"
  - ".ai/assets/skills/software-development-orchestrator/references/workflow-artifact-playbook.md"
  - ".ai/assets/skills/software-development-orchestrator/references/output-contract.md"
  - ".ai/assets/skills/software-development-orchestrator/references/acceptance-oracle.md"
  - ".dev/standards/WORKFLOW-HANDOFF-POLICY.md"
acceptance:
  validator: ".ai/scripts/validate-software-development-orchestrator-acceptance.py"
  test: ".ai/scripts/tests/test_software_development_orchestrator_acceptance.py"
  activation_fixture: ".ai/assets/skills/software-development-orchestrator/fixtures/acceptance/activation-high-level-pending-approval.yaml"
  activation_expected: ".ai/assets/skills/software-development-orchestrator/fixtures/acceptance/activation-high-level-pending-approval.expected.yaml"
  fresh_session_blueprint: ".ai/assets/skills/software-development-orchestrator/fixtures/acceptance/fresh-session-checkpoint-blueprint.yaml"
workflow_artifacts:
  workflow_kind: "software-development"
  workflow_id_pattern: "YYYY-MM-DD-topic[-NN]"
  artifact_root_default: ".dev/workflows/<workflow-id>"
  locator: ".ai/assets/skills/software-development-orchestrator/templates/workflow-locator-template.yaml"
  plan: ".ai/assets/skills/software-development-orchestrator/templates/development-workflow-plan-template.md"
  task: ".ai/assets/skills/software-development-orchestrator/templates/development-workflow-task-template.json"
  review: ".ai/assets/skills/software-development-orchestrator/templates/development-review-report-template.md"
examples:
  - ".dev/guides/ai-collaboration-guides/SOFTWARE-DEVELOPMENT-ORCHESTRATOR-SKILL-GUIDE.md"
human_guide: ".dev/guides/ai-collaboration-guides/SOFTWARE-DEVELOPMENT-ORCHESTRATOR-SKILL-GUIDE.md"
wrapper_targets:
