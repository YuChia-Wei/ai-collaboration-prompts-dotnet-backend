schema_version: 2.0.0
profile:
  id: dotnet-backend
  version: 2.0.0
  description: Complete portable AI collaboration context with the retained .NET backend capability.
  component_id: dotnet-backend
  requires:
    - software-development-core

release_model: single-versioned-componentized-release

components:
  - component_id: software-development-core
    classification: mandatory-core
    required: true
    requires: []
  - component_id: ai-context-lifecycle-core
    classification: mandatory-core
    required: true
    requires: []
  - component_id: dotnet-backend
    classification: technology-profile
    required: false
    requires:
      - software-development-core
  - component_id: repo-backlog
    classification: optional-provider
    required: false
    default_enabled: false
    requires:
      - software-development-core

selection_defaults:
  release_model: single-versioned-componentized-release
  mandatory_components:
    - software-development-core
    - ai-context-lifecycle-core
  profiles:
    - dotnet-backend
  providers:
    repo-backlog:
      enabled: false
      preservation: preserve-existing-if-recorded

selection_semantics:
  archive_inventory: all-declared-component-bytes
  package_and_migration_selection: clean-install-default
  effective_selection: target-planner-resolution

component_identity:
  default: entry-component-id
  overrides: source-path-pattern-to-single-component
  ambiguity: fail-closed
  ownership: exactly-one-component-per-distributed-path

package:
  source_repository: https://github.com/YuChia-Wei/ai-collaboration-prompts-dotnet-backend
  name_template: ai-context-dotnet-backend-v{version}
  formats:
    - zip
    - tar.gz
  envelope:
    install_guide: INSTALL.md
    runtime_requirements: requirements.txt
    metadata_root: metadata
    payload_root: payload
  deterministic:
    source: immutable-git-commit-tree
    content_bytes: git-blob-bytes
    executable_source: git-tree-mode-100755
    unsupported_git_entries: reject-symlink-submodule-and-non-regular
    path_order: utf8-bytewise-ascending
    path_separator: /
    timestamp: source-date-epoch
    zip_timestamp: source-date-epoch-clamped-to-1980-01-01T00:00:00Z
    file_mode: "0644"
    executable_mode: "0755"
    uid: 0
    gid: 0
    owner_name: root
    group_name: root
    compression:
      zip: deflate-level-9
      tar: gzip-level-9-no-original-filename

ownership_classes:
  framework-managed:
    install_behavior: managed
    description: Released reusable bytes controlled by the framework.
  target-template:
    install_behavior: seed
    description: Public seed content that becomes target-owned after initialization.
  target-owned:
    install_behavior: exclude
    description: Target project truth that must never be supplied from this source repository.

entries:
  - id: canonical-ai-assets
    component_id: software-development-core
    source: .ai/assets/**
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .ai/assets/skills/README.MD
          - .ai/assets/skills/ai-context-auditor/**
          - .ai/assets/skills/ai-context-governance/**
          - .ai/assets/skills/ai-context-upgrader/**
          - .ai/assets/skills/repo-structure-sync/**
          - .ai/assets/sub-agent-role-prompts/context-translator/**
    target: .ai/assets/
    ownership: framework-managed
    install_behavior: managed
  - id: ai-entry-documents
    component_id: ai-context-lifecycle-core
    source:
      - .ai/README.MD
      - .ai/INDEX.MD
      - .ai/DIRECTORY-RULES.MD
      - .ai/SUB-AGENT-SYSTEM.MD
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: ai-runtime-scripts
    component_id: software-development-core
    source: .ai/scripts/**
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .ai/scripts/README.md
          - .ai/scripts/ai_context_package_apply.py
          - .ai/scripts/ai_context_target_provenance.py
          - .ai/scripts/plan-ai-context-package-apply.py
          - .ai/scripts/validate-ai-context.py
          - .ai/scripts/validate-ai-context-target.py
          - .ai/scripts/tests/test_ai_context_package_apply.py
          - .ai/scripts/tests/test_ai_context_root_entries.py
          - .ai/scripts/tests/test_ai_context_wrapper_metadata.py
          - .ai/scripts/tests/test_semantic_customization_lifecycle.py
          - .ai/scripts/tests/test_semantic_customization_skill_contract.py
    target: .ai/scripts/
    ownership: framework-managed
    install_behavior: managed
  - id: codex-skill-wrappers
    component_id: software-development-core
    source: .agents/skills/**
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .agents/skills/README.md
          - .agents/skills/ai-context-auditor/**
          - .agents/skills/ai-context-governance/**
          - .agents/skills/ai-context-upgrader/**
          - .agents/skills/repo-structure-sync/**
    target: .agents/skills/
    ownership: framework-managed
    install_behavior: managed
  - id: claude-skill-wrappers
    component_id: software-development-core
    source: .claude/skills/**
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .claude/skills/README.md
          - .claude/skills/ai-context-auditor/**
          - .claude/skills/ai-context-governance/**
          - .claude/skills/ai-context-upgrader/**
          - .claude/skills/repo-structure-sync/**
    target: .claude/skills/
    ownership: framework-managed
    install_behavior: managed
  - id: codex-agent-adapters
    component_id: software-development-core
    source: .codex/agents/**
    target: .codex/agents/
    ownership: framework-managed
    install_behavior: managed
  - id: claude-agent-adapters
    component_id: software-development-core
    source: .claude/agents/**
    target: .claude/agents/
    ownership: framework-managed
    install_behavior: managed
  - id: copilot-agent-adapters
    component_id: software-development-core
    source: .github/agents/**
    target: .github/agents/
    ownership: framework-managed
    install_behavior: managed
  - id: governance-standards
    component_id: software-development-core
    source:
      - .dev/standards/**
      - .dev/TEAM-GIT-FLOW-RULES.MD
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .dev/standards/AI-CONTEXT-*.md
          - .dev/standards/ASSESSMENT-ARTIFACT-POLICY.md
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: reusable-guides
    component_id: software-development-core
    source: .dev/guides/**
    component_overrides:
      - component_id: ai-context-lifecycle-core
        patterns:
          - .dev/guides/ai-collaboration-guides/AI-CONTEXT-AUDITOR-SKILL-GUIDE.md
          - .dev/guides/ai-collaboration-guides/AI-CONTEXT-GOVERNANCE-SKILL-GUIDE.md
          - .dev/guides/ai-collaboration-guides/AI-CONTEXT-UPGRADER-SKILL-GUIDE.md
          - .dev/guides/ai-collaboration-guides/REPO-STRUCTURE-SYNC-SKILL-GUIDE.md
    target: .dev/guides/
    ownership: framework-managed
    install_behavior: managed
  - id: domain-language-templates
    component_id: software-development-core
    source:
      - .dev/domain-language/README.MD
      - .dev/domain-language/templates/**
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: problem-frame-assets
    component_id: software-development-core
    source:
      - .dev/problem-frames/README.MD
      - .dev/problem-frames/SEMANTICS.md
      - .dev/problem-frames/templates/**
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: specification-authoring-guides
    component_id: software-development-core
    source:
      - .dev/specs/README.MD
      - .dev/specs/SPEC-GUIDE.MD
      - .dev/specs/SPEC-ORGANIZATION-GUIDE.MD
      - .dev/specs/tests/README.MD
      - .dev/specs/tests/TEST-SPEC-GUIDE.MD
      - .dev/specs/tests/GHERKIN-FEATURE-STORAGE-GUIDE.MD
      - .dev/specs/tests/cross-domain/README.MD
      - .dev/specs/tests/e2e/README.MD
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: requirement-authoring-guide
    component_id: software-development-core
    source: .dev/requirement/REQUIREMENT-GUIDE.MD
    target: .dev/requirement/REQUIREMENT-GUIDE.MD
    ownership: framework-managed
    install_behavior: managed
  - id: operations-authoring-guides
    component_id: software-development-core
    source:
      - .dev/operations/README.MD
      - .dev/operations/*-GUIDE.MD
      - .dev/operations/runbooks/README.MD
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: adr-governance
    component_id: software-development-core
    source:
      - .dev/adr/README.md
      - .dev/adr/ADR-TEMPLATE.md
      - .dev/adr/WHEN-TO-CREATE-ADR.MD
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: assessment-governance
    component_id: ai-context-lifecycle-core
    source:
      - .dev/assessments/README.MD
      - .dev/assessments/templates/**
    target: preserve-relative-path
    ownership: framework-managed
    install_behavior: managed
  - id: backlog-governance
    component_id: repo-backlog
    source: .dev/backlog/README.MD
    target: .dev/backlog/README.MD
    ownership: framework-managed
    install_behavior: managed
  - id: workflow-governance
    component_id: software-development-core
    source: .dev/workflows/README.MD
    target: .dev/workflows/README.MD
    ownership: framework-managed
    install_behavior: managed
  - id: dotnet-validation-tools
    component_id: dotnet-backend
    source: tools/**
    target: tools/
    ownership: framework-managed
    install_behavior: managed
  - id: public-root-and-catalog-seeds
    component_id: ai-context-lifecycle-core
    source:
      - .ai/assets/skills/repo-structure-sync/templates/public-root/**
      - .ai/assets/skills/repo-structure-sync/templates/public-catalogs/**
    target: mapping-declared-by-template-manifest
    template_manifest: .ai/assets/skills/repo-structure-sync/templates/public-template-manifest.yaml
    template_source_resolution: manifest-directory-relative
    ownership: target-template
    install_behavior: seed
  - id: repository-integration-seeds
    component_id: software-development-core
    source:
      - .editorconfig
      - .gitattributes
      - global.json
      - .github/pull_request_template.md
    target: preserve-relative-path
    ownership: target-template
    install_behavior: seed

exclusions:
  - id: source-root-truth
    classification: source-only
    patterns:
      - AGENTS.md
      - AGENTS.zh-TW.md
      - agents.zh-tw.md
      - CLAUDE.md
      - README.md
      - README.en.md
    reason: Active source-repository identity is not a public target template.
  - id: source-project-truth
    classification: source-only
    patterns:
      - .dev/ARCHITECTURE.md
      - .dev/INDEX.md
      - .dev/README.MD
      - .dev/requirement/*
      - .dev/specs/INDEX.MD
      - .dev/specs/domains/**
      - .dev/problem-frames/INDEX.md
      - .dev/problem-frames/instances/**
      - .dev/domain-language/contexts/**
      - .dev/adr/INDEX.md
      - .dev/assessments/INDEX.MD
      - .dev/backlog/INDEX.MD
      - .dev/backlog/items/**
      - .dev/workflows/INDEX.MD
      - .dev/releases/**
    except:
      - .dev/requirement/REQUIREMENT-GUIDE.MD
    reason: These paths contain source-repository facts or mutable catalogs.
  - id: execution-history
    classification: source-only
    patterns:
      - .dev/workflows/*/**
      - .dev/assessments/*/**
    except:
      - .dev/assessments/templates/**
    reason: Dated workflow and assessment instances are source runtime history.
  - id: product-placeholders
    classification: source-only
    patterns:
      - src/**
      - tests/**
      - docker-compose/**
    reason: Product implementation trees and source placeholders are outside AI context distribution.
  - id: repository-and-local-runtime-state
    classification: source-only
    patterns:
      - .git/**
      - .gitignore
      - .codex/config.toml
      - .ai/scripts/ai_context_package.py
      - .ai/scripts/build-ai-context-package.py
      - .ai/scripts/compare-ai-context-versions.py
      - .ai/scripts/prepare-ai-context-release.py
      - .ai/scripts/render-ai-context-release-notes.py
      - .ai/scripts/validate-ai-context-package.py
      - .ai/scripts/validate-ai-context-release-state.py
      - .ai/scripts/validate-ai-context-versions.py
      - .ai/scripts/validate-source-governance.py
      - .ai/scripts/tests/test_backlog_release_contract.py
      - .ai/scripts/tests/test_ai_context_packaging.py
      - .ai/scripts/tests/test_ai_context_release_state.py
      - .ai/scripts/tests/test_ai_context_version_governance.py
      - .ai/scripts/tests/test_governance_workflow_contract.py
      - .ai/scripts/tests/test_prepare_ai_context_release.py
      - .ai/scripts/tests/test_release_notes_renderer.py
      - .ai/assets/skills/ai-context-governance/templates/release-publication/**
      - '**/bin/**'
      - '**/obj/**'
      - '**/__pycache__/**'
      - '**/.pytest_cache/**'
    reason: Git state, source release/build tests, local runtime policy, and caches are never portable framework truth.
  - id: source-distribution-control
    classification: source-only
    patterns:
      - .ai/distribution/**
    reason: Build contracts generate envelope metadata but are not target payload.

generated_metadata:
  package: metadata/package.yaml
  files: metadata/files.yaml
  migration: metadata/migration.yaml
  checksums: metadata/SHA256SUMS.txt
  checksum_scope: all-envelope-members-except-metadata/SHA256SUMS.txt
  payload_digest: sha256-of-utf8-lines-sha256-two-spaces-target-path-newline
  archive_checksums: external-sidecars-not-archive-members

reference_integrity:
  text_extensions:
    - .md
    - .yaml
    - .yml
    - .json
    - .toml
    - .txt
    - .sh
    - .ps1
  forbidden_source_lifecycle_patterns:
    - .dev/workflows/20*/**
    - .dev/assessments/ASM-*/**
    - .dev/releases/v*/**
    - .dev/backlog/items/**
