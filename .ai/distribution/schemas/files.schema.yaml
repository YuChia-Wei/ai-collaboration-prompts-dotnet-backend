schema_version: 1.0.0
document: files.yaml
required:
  - schema_version
  - package_id
  - files
file_entry:
  required:
    - path
    - source_path
    - sha256
    - size
    - mode
    - ownership
    - install_behavior
  properties:
    path: unique-relative-posix-path-under-payload
    source_path: repository-relative-posix-path
    sha256: lowercase-sha256
    size: non-negative-integer
    mode: octal-string
    ownership:
      enum: [framework-managed, target-template]
    install_behavior:
      enum: [managed, seed, reconcile]
    entry_id: profile-entry-id
  additional_properties: false
ordering: path-utf8-bytewise-ascending
additional_properties: false
