schema_version: 2.0.0
document: files.yaml
required:
  - schema_version
  - package_id
  - files
file_entry:
  required:
    - path
    - source_path
    - sha256
    - size
    - mode
    - ownership
    - install_behavior
    - component_id
  properties:
    path: unique-target-relative-posix-path
    archive_member: envelope-root/payload/path
    source_path: repository-relative-posix-path
    sha256: lowercase-sha256
    size: non-negative-integer
    mode: octal-string
    ownership:
      enum: [framework-managed, target-template]
    install_behavior:
      enum: [managed, seed, reconcile]
    component_id: profile-component-id
    entry_id: profile-entry-id
  additional_properties: false
ordering: path-utf8-bytewise-ascending
path_safety: reject-absolute-dot-dot-backslash-and-output-collisions
inventory_semantics:
  scope: all-declared-component-bytes
  install_filter: component-id-against-effective-selection
additional_properties: false
read_compatibility:
  - "1.0.0"
