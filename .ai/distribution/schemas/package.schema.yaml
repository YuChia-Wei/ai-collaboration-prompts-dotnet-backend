schema_version: 2.0.0
document: package.yaml
required:
  - schema_version
  - package_id
  - profile_id
  - version
  - release_id
  - selection
  - source
  - created_at
  - source_date_epoch
  - payload
properties:
  schema_version: semver
  package_id: non-empty-string
  profile_id: non-empty-string
  version: semver-without-v-prefix
  release_id: REL-vMAJOR.MINOR.PATCH
  selection:
    semantics:
      scope: clean-install-default
      archive_inventory: all-declared-component-bytes
      effective_selection: resolved-by-target-planner
    required:
      - release_model
      - mandatory_components
      - profiles
      - providers
    properties:
      release_model:
        const: single-versioned-componentized-release
      mandatory_components:
        exact_set:
          - software-development-core
          - ai-context-lifecycle-core
      profiles:
        type: unique-non-empty-component-id-list
      providers:
        type: component-provider-selection-mapping
        properties:
          repo-backlog:
            required: [enabled, preservation]
            properties:
              enabled: boolean
              preservation:
                enum: [preserve-existing-if-recorded]
  source:
    required: [repository, ref, commit]
    properties:
      repository: non-empty-string
      ref: immutable-tag-or-full-commit
      commit: full-40-character-sha
  created_at: iso-8601
  source_date_epoch: non-negative-integer
  payload:
    required: [root, file_count, sha256]
    properties:
      root: relative-posix-path
      file_count: non-negative-integer
      sha256: lowercase-sha256
    sha256_definition: sha256-of-utf8-lines-sha256-two-spaces-target-path-newline
  compatibility:
    required: [minimum_governed_source, breaking_changes]
additional_properties: false
read_compatibility:
  - "1.0.0"
