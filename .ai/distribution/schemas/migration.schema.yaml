schema_version: 3.0.0
document: migration.yaml
required:
  - schema_version
  - package_id
  - selection
  - to
  - clean_install
  - sources
properties:
  schema_version: semver
  package_id: non-empty-string
  selection:
    required:
      - release_model
      - mandatory_components
      - profiles
      - providers
    properties:
      release_model:
        const: single-versioned-componentized-release
      mandatory_components:
        exact_set:
          - software-development-core
          - ai-context-lifecycle-core
      profiles:
        type: unique-non-empty-component-id-list
      providers:
        type: component-provider-selection-mapping
        properties:
          repo-backlog:
            required: [enabled, preservation]
            properties:
              enabled: boolean
              preservation:
                enum: [preserve-existing-if-recorded]
  clean_install:
    required: [operations]
    properties:
      operations: operation-list
  sources:
    ordering: semantic-version-ascending
    uniqueness: version-and-manifest-sha256
    item_required: [version, manifest_sha256, operations]
    properties:
      version: semver-without-v-prefix
      manifest_sha256: lowercase-sha256
      operations: operation-list
    selection:
      required_inputs: [previous_version, previous_files_manifest]
      identity: exact-version-and-sha256
      unknown_source: fail-closed
      ambiguous_source: fail-closed
  to:
    required: [version, manifest_sha256]
    properties:
      version: semver-without-v-prefix
      manifest_sha256: lowercase-sha256
  operation-list:
    ordering: operation-id-ascending
    item_required: [id, kind, path, ownership, preconditions, component_id]
    properties:
      component_id: profile-component-id
    kinds:
      add:
        required_preconditions: [destination_absent]
      replace:
        required_preconditions: [current_sha256_equals_previous_release]
      remove:
        required_preconditions: [current_sha256_equals_previous_release]
      rename:
        required: [from_path, path]
        required_preconditions: [source_sha256_equals_previous_release, destination_absent]
      reconcile:
        required_preconditions: [human_acknowledgement]
    ownership:
      enum: [framework-managed, target-template, target-owned]
    ownership_operation_rules:
      framework-managed: [add, replace, remove, rename, reconcile]
      target-template: [add, reconcile]
      target-owned: [reconcile]
    target_template_rules:
      add_requires: [destination_absent]
      forbidden: [replace, remove, rename]
    target_owned_rules:
      forbidden: [add, replace, remove, rename]
  safety:
    required:
      - dry_run_default
      - clean_worktree_required
      - starting_commit_required
      - abort_on_unacknowledged_reconciliation
additional_properties: false
manifest_sha256_definition: sha256-of-source-files-yaml-bytes
read_compatibility:
  - "1.0.0"
  - "2.0.0"
