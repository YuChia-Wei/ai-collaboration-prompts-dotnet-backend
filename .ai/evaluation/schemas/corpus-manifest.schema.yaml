schema_version: "1.0"
schema_id: "ai-behavior-corpus-manifest"
type: "mapping"
required:
  - "schema_version"
  - "corpus_id"
  - "corpus_version"
  - "manifest_schema"
  - "result_schema"
  - "baseline"
  - "boundaries"
  - "families"
  - "cases"
case_required:
  - "case_id"
  - "family"
  - "input"
  - "expected"
invariants:
  - "case identifiers are unique"
  - "each declared family has exactly one deterministic case"
  - "all references are safe repository-relative paths"
  - "distributed references contain placeholders instead of lifecycle instances"
