schema_version: "1.0"
corpus_id: "ai-behavior-deterministic"
corpus_version: "1.0.0"
manifest_schema: ".ai/evaluation/schemas/corpus-manifest.schema.yaml"
result_schema: ".ai/evaluation/schemas/evaluation-result.schema.yaml"
baseline: ".ai/evaluation/baselines/v1.yaml"
boundaries:
  input: "structured-preclassified-facts"
  natural_language_classification: "out-of-scope"
  model_calls: "out-of-scope"
  model_in_loop: "separately-approved-release-side-only"
families:
  - "empty"
  - "existing"
  - "copied-template"
  - "software-development"
  - "customization-upgrade"
  - "identifier-compatibility"
cases:
  - case_id: "empty-repository"
    family: "empty"
    input: ".ai/evaluation/fixtures/empty-repository.yaml"
    expected: ".ai/evaluation/expected/empty-repository.yaml"
  - case_id: "existing-repository"
    family: "existing"
    input: ".ai/evaluation/fixtures/existing-repository.yaml"
    expected: ".ai/evaluation/expected/existing-repository.yaml"
  - case_id: "copied-template-repository"
    family: "copied-template"
    input: ".ai/evaluation/fixtures/copied-template-repository.yaml"
    expected: ".ai/evaluation/expected/copied-template-repository.yaml"
  - case_id: "software-development"
    family: "software-development"
    input: ".ai/evaluation/fixtures/software-development.yaml"
    expected: ".ai/evaluation/expected/software-development.yaml"
  - case_id: "customization-upgrade"
    family: "customization-upgrade"
    input: ".ai/evaluation/fixtures/customization-upgrade.yaml"
    expected: ".ai/evaluation/expected/customization-upgrade.yaml"
  - case_id: "identifier-compatibility"
    family: "identifier-compatibility"
    input: ".ai/evaluation/fixtures/identifier-compatibility.yaml"
    expected: ".ai/evaluation/expected/identifier-compatibility.yaml"
