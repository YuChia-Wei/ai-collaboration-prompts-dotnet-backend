resolution_ref: null
decision_needed: "At v0.5.0 activation, approve the native-adapter promotion criteria and decide whether any role beyond context-translator has a concrete runtime-specific model, tool, permission, or invocation requirement; default to no bulk adapter generation."
related_backlog_refs:
  - "SKILL-001"
roadmap_timing:
  patch_candidate:
    version: "v0.4.2"
    scope: "Add context-translator to active routing and related catalogs without changing adapter behavior or schema."
  target:
    version: "v0.5.0"
    scope: "Define integration modes, add adapter metadata and parity validation, verify packaging, and record explicit role-by-role promotion decisions."
  consumer:
    version: "v0.6.0"
    scope: "Use the stabilized contract during skill-family taxonomy work without treating taxonomy as automatic adapter promotion."
integration_modes:
  dynamic:
    signal: "wrapper_targets is empty"
    contract: "The owning skill or main agent reads the canonical sub-agent.yaml and delegates to a generic worker."
  runtime_native:
    signal: "wrapper_targets is non-empty and exact adapter path metadata exists"
    contract: "Thin runtime adapters select only runtime-specific model, tools, permissions, or invocation behavior and defer normative rules to the canonical role."
acceptance_criteria:
  - "Document dynamic canonical loading as the default and runtime-native promotion as an evidence-backed exception."
  - "Add a sub-agent adapter metadata contract with exact target-to-path parity for codex, claude, and copilot."
  - "Extend deterministic validation and GWT fixtures to reject missing, extra, duplicate, escaping, placeholder, and nonexistent adapter paths."
  - "Validate that every declared runtime-native adapter imports or cites its canonical sub-agent role and that package profiles include the adapter path."
  - "Add context-translator to active routing and align human-facing taxonomy and usage references without duplicating canonical rules."
  - "Inventory all 18 roles and record an explicit keep-dynamic or promote-native disposition; do not generate adapters solely for symmetry."
  - "Verify then-current runtime schemas and actual client availability before claiming that an adapter is executable."
