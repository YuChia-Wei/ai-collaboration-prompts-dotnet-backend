  - ".dev/backlog/plans/post-v0.4.0-improvement-plan.md"
  - ".dev/workflows/2026-07-18-sub-agent-runtime-integration-planning/workflow-plan.md"
recommended_owner_skill: "ai-context-governance"
handoff_condition: "Use v0.4.2 only for the existing context-translator routing/catalog correction; after v0.4.2 closes, open a dedicated v0.5.0 workflow for schema, validator, packaging, and selective promotion decisions."
workflow_refs:
  - ".dev/workflows/2026-07-18-sub-agent-runtime-integration-planning/workflow.yaml"
