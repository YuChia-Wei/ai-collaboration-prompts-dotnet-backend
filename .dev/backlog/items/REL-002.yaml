decision_needed: "Resolved: PR #2 merged as 540cd029; the sanctioned pre-tag command passed on that clean main commit and printed, but did not execute, the separately owner-authorized tag command."
acceptance:
  - "The runner consumes subprocess output as bytes and decodes it deterministically without a background reader-thread exception."
  - "Windows resolves the Git Bash executable from the active Git installation or standard installation roots without falling through to the WSL bash launcher."
  - "The child-process environment prepends the selected Git installation's usr/bin only for the gate invocation, without mutating the parent environment."
  - "Invalid UTF-8 bytes are represented safely while retaining surrounding diagnostic output."
  - "When both streams contain output, the failure retains the gate summary from stdout and detailed diagnostics from stderr."
  - "A failed command with empty or unavailable output produces a deterministic exit-code error instead of an attribute error."
  - "The exact critical-gate command allowlist remains unchanged."
  - "Focused regressions, the critical gate, and required hosted workflows pass."
  - "The sanctioned v0.5.0 pre-tag command passes on merged main without creating a tag."
  - "Any later main merge expires every previously printed tag command; the operator must rerun pre-tag on current clean main and use only the newly printed command."
inventory_notes:
  - "The defect was observed only after merging the independently verified candidate to main and executing the owner-only pre-tag command; its invalid bytes were localized output from the Windows WSL launcher selected ahead of Git Bash."
  - "v0.4.2 remains the required fourth exact automatic source; this hotfix does not change migration compatibility."
  - "Hosted runs 29883289326, 29883289335, and 29883289321 passed on final branch candidate 47aa1cc before PR #2 merged as 540cd02905603aae2f7c1bd623673dcda171c314."
  - "The unrestricted merged-main pre-tag command passed and reported exact automatic sources v0.3.0, v0.4.0, v0.4.1, and v0.4.2; immutable tag v0.5.0 and hosted run 29922585651 subsequently completed publication."
  - "The closeout merge changed main after the first successful preparation, so preparation was rerun successfully on 03f86ccc; the durable instruction intentionally avoids pinning that mutable checkpoint as a future tag command."
