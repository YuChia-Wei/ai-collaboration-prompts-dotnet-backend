decision_needed: "During v0.5.0 implementation, approve the machine-readable resume-evidence shape, provider-native attribution evidence union, and phase-specific release checks after real Copilot, Claude, and Codex fixtures are captured."
acceptance:
  - "A receiving agent pins the repository, branch, commit, workflow, current task, dirty state, and exact next action before continuing."
  - "The receiving agent runs check-all.sh --critical and records the command, exit status, and bounded output evidence in the resume checkpoint."
  - "A red critical gate blocks continuation except for a workflow task explicitly scoped to repair that failure."
  - "Validation claims in workflow tasks and commits reference a runnable command plus observed result rather than free-text success assertions."
  - "Release handoffs additionally run the REL-001 phase-specific state check before tag, publication, or finalization work continues."
  - "The policy explicitly targets the weakest credible executor and does not assume access to the previous model's hidden context."
  - "Repository policy and validators preserve provider-native Author, Committer, cryptographic signature, provider trailers, human co-author, and session-log metadata; they never require an amend or rewrite solely to normalize attribution."
  - "AI attribution is accepted as a provider-compatible evidence union rather than one mandatory trailer shape: provider-native authorship or signed session metadata, a provider-native Co-Authored-By trailer, or a repository-created local AI contribution trailer may satisfy the applicable path."
  - "Repository-owned Copilot or Claude settings do not disable, replace, or pin native attribution behavior; any future settings change that can affect attribution requires explicit owner approval and a provider fixture proving preservation."
  - "Execution provenance is supplemental to commit attribution and records model_source as runtime-reported, provider-reported, user-declared, or unavailable; user-declared model or reasoning labels remain verbatim and are never represented as runtime-verified."
  - "Before changing GIT-COMMIT-POLICY or validate-git-commits.py, real provider-generated golden fixtures cover Copilot CLI, Copilot cloud agent, Claude, and Codex paths; unknown provider behavior remains an explicit blocked fixture rather than an invented identity."
  - "Regression tests prove each provider-native fixture passes without message mutation and prove the validator itself performs no commit-writing command."
inventory_notes:
  - "The gate applies to model, runtime, host, and fresh-session handoffs; it is not tied to Gemini, Claude, or Codex."
  - "External reviewers may remain format-independent; the receiving workflow normalizes their evidence through the assessment intake contract."
  - "GitHub documents that Copilot CLI defaults includeCoAuthoredBy to true, while a committed .github/copilot/settings.json can override it; this backlog item therefore forbids repository attribution overrides by default."
  - "GitHub documents a different Copilot cloud-agent shape: Copilot is the author, the initiating human is co-author, commits are signed, and messages link to session logs. The current final-Co-Authored-By-only validator cannot represent that native shape and is an explicit HANDOFF-001 compatibility gap."
  - "The 2026-07-20 official Anthropic documentation search established Claude Code model selection and Git automation but did not establish a stable native commit-attribution contract. Claude compatibility therefore requires a captured real fixture before implementation."
  - "This planning change updates only HANDOFF-001 and workflow evidence. It does not edit .github/copilot settings, .claude settings, GIT-COMMIT-POLICY, validate-git-commits.py, or existing Git history."
