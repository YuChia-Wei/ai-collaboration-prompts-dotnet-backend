decision_needed: "Approve the machine-readable resume-evidence shape and which workflow phases require stronger release-specific checks in addition to check-all.sh --critical."
acceptance:
  - "A receiving agent pins the repository, branch, commit, workflow, current task, dirty state, and exact next action before continuing."
  - "The receiving agent runs check-all.sh --critical and records the command, exit status, and bounded output evidence in the resume checkpoint."
  - "A red critical gate blocks continuation except for a workflow task explicitly scoped to repair that failure."
  - "Validation claims in workflow tasks and commits reference a runnable command plus observed result rather than free-text success assertions."
  - "Release handoffs additionally run the REL-001 phase-specific state check before tag, publication, or finalization work continues."
  - "The policy explicitly targets the weakest credible executor and does not assume access to the previous model's hidden context."
inventory_notes:
  - "The gate applies to model, runtime, host, and fresh-session handoffs; it is not tied to Gemini, Claude, or Codex."
  - "External reviewers may remain format-independent; the receiving workflow normalizes their evidence through the assessment intake contract."
