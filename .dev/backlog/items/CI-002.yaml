acceptance:
  - "Inventory every active workflow trigger, path filter, manual dispatch, permission, concurrency rule, job responsibility, and mutation boundary."
  - "Classify each executable check as general governance, portable validation, candidate build, tag validation, publication, or finalization."
  - "No general governance path may invoke a hardcoded release phase merely because an unrelated backlog, guide, standard, or workflow record changed."
  - "Candidate, tag, publication, and finalization checks run only in workflows that own those lifecycle events or under an explicit changed-path condition."
  - "The review identifies duplicate gates, missing gates, stale version literals, post-publication behavior, skipped-check risks, and expected runner cost."
  - "PR updates use bounded concurrency or retain an explicit reason not to cancel superseded runs."
  - "Workflow contract tests enforce the accepted trigger and ownership matrix and fail on phase-specific regression."
  - "The review reconciles CI-001 Node.js 24 action migration so related workflow edits are not duplicated."
inventory_notes:
  - "The static four-workflow lifecycle matrix is implemented locally at b18833f. A newly discovered v0.6 blocker remains: the version-specific release phase validator and singleton contract only accept v0.5.0."
  - "PR #6 proved that .dev/backlog/** correctly triggered governance but the same job still executed a v0.5.0 candidate-only command after v0.5.0 was published."
  - "The short-term repair removes concrete release-phase execution from general governance while retaining release tooling unit tests."
  - "Portable Gates passed PR #6 before the repair; the failure was deterministic and isolated to release lifecycle ownership."
