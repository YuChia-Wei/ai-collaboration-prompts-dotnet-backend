acceptance:
  - "A canonical release-publication runbook gives each action an exact command, expected output, and fail action from candidate creation through post-publication finalization."
  - "The runbook prohibits copying a previous release instance and routes agents to placeholder templates."
  - "Release locator, task, registry, notes, and migration artifacts are instantiated from templates with no previous-version values."
  - "Validation rejects unfilled placeholders, copied prior run IDs, impossible timestamps, unrelated backlog references, generated release-body content in authored sources, and empty migration guidance."
  - "A sanctioned pre-tag command verifies the validated registry skeleton, clean authored sources, exact candidate identity, and a green critical gate before creating an annotated tag."
  - "A terminal-state validator proves that an existing published tag has a published registry record whose commit equals the tag peel and whose authored notes contain no rendered provenance."
  - "The release-specific validation route is exercised by the ENF-001 pull-request CI contract."
inventory_notes:
  - "REL-001 owns release publication mechanics; ENF-001 owns general AI-context PR CI and semantic wrapper enforcement."
  - "The public GitHub Release body is a rendered output and must never be committed as release-notes.md."
