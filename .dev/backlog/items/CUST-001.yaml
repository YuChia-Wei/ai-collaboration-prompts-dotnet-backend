status: "resolved"
priority: "HIGH"
summary: "Introduce one target-owned semantic customization ledger beside provenance so governance, auditor, and upgrader can reconcile capability, rule, and contract customizations without treating path differences as sufficient meaning."
created_at: "2026-07-24T00:31:35+08:00"
updated_at: "2026-07-24T09:24:13+08:00"
release:
  target: "v0.6.0"
  completed_in: "v0.6.0"
  published_in: null
  target_scope: "semantic-customization-ledger-and-cross-lifecycle-reconciliation"
  gate: "release-blocker"
origin_refs:
  - ".dev/workflows/2026-07-23-v0-6-product-contract-planning/workflow.yaml"
  - ".dev/workflows/2026-07-23-v0-6-product-contract-planning/workflow-plan.md"
  - ".ai/assets/skills/ai-context-upgrader/references/provenance-contract.md"
recommended_owner_skill: "ai-context-governance"
handoff_condition: "Implement with DIST-001 provenance and migration design. Do not infer semantic customization solely from changed bytes, and do not retire a target customization without explicit owner reconciliation."
workflow_refs:
  - ".dev/workflows/2026-07-23-v0-6-product-contract-planning/workflow.yaml"
task_refs:
  - ".dev/workflows/2026-07-23-v0-6-product-contract-planning/tasks/V060PLAN-001.json"
  - ".dev/workflows/2026-07-23-v0-6-product-contract-planning/tasks/V060IMP-002.json"
resolution_ref: ".dev/workflows/2026-07-23-v0-6-product-contract-planning/reports/remediation-report.md"
decision_needed: "Owner decision recorded on 2026-07-24: use one .dev/ai-context/customizations.yaml ledger; identify entries primarily by capability, rule, or contract; retain requirement, ADR, and workflow evidence; keep enterprise test and permission policy as target-owned truth unless it changes framework behavior."
storage_contract:
  path: ".dev/ai-context/customizations.yaml"
  provenance_reference: ".dev/ai-context/provenance.yaml"
  authority: "target-owned-semantic-customization-truth"
  initial_shape: "single-file-ledger"
identity_contract:
  primary:
    - "stable customization id"
    - "capability, rule, or contract id"
    - "semantic relationship"
  evidence:
    - "affected paths"
    - "base framework version or commit"
    - "requirement, ADR, and workflow references"
    - "validation and reconciliation evidence"
semantic_relationships:
  - "extends"
  - "replaces"
  - "deviates"
  - "target-only"
incoming_equivalence:
  - "absent"
  - "partial"
  - "equivalent-candidate"
  - "conflicting"
acceptance:
  - "The v0.6.0 target-owned source of truth is one .dev/ai-context/customizations.yaml file referenced by .dev/ai-context/provenance.yaml."
  - "Every entry has a stable ID and identifies the affected capability, rule, or contract before listing paths as supporting evidence."
  - "Every entry records semantic relationship, owner, reason, dependencies, base framework evidence, and requirement, ADR, or workflow decision evidence when applicable."
  - "Target-owned requirements, ADRs, runbooks, maintenance windows, test commands, enterprise network rules, and permission policies are not classified as framework customizations merely because they are absent upstream."
  - "A target-owned policy is recorded in the ledger only when it extends, replaces, or deviates from framework-managed behavior; the raw target policy remains target-owned truth."
  - "Governance records authorized customizations, auditor verifies active-context correspondence, upgrader performs Base/Incoming/Target plus semantic-equivalence analysis, governance records reconciliation, and auditor verifies the post-upgrade state."
  - "Incoming official behavior is classified as absent, partial, equivalent-candidate, or conflicting; equivalence never silently grants retirement authority."
  - "Retain, merge, supersede, retire, and unresolved dispositions require explicit evidence and owner authority; upgrader updates provenance only after target validation succeeds."
  - "Legacy targets without reliable provenance or customization records enter unresolved manual inventory rather than automatic overwrite."
  - "Schema, migration, validators, package projection, examples, and downstream upgrade fixtures are updated together."
inventory_notes:
  - "The current .dev/AI-CONTEXT-SOURCE.yaml local_overrides contract is path-oriented and cannot express capability equivalence."
  - "UPG-001 remains the real legacy-target acceptance case; it does not solely own the cross-lifecycle ledger schema."
