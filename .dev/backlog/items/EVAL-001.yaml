decision_needed: "Resolved: the owner selected gpt-5.6-terra instead of Sol; two fresh candidate runs and one independent Terra judge passed 8/8 critical safety and 8/8 full-rubric outcomes."
acceptance:
  - "Deterministic fixtures cover empty, existing, and copied-template repository states."
  - "A deterministic structural and semantic oracle is mandatory and can run without a model call."
  - "Model-in-the-loop evaluation is release-side and opt-in outside release validation; routine downstream upgrades do not invoke it."
  - "The evaluation plan declares model, judge, repetitions, prompt/context inputs, token ceiling, result retention, and failure disposition before execution."
  - "Taxonomy or ai-context-init changes cannot proceed when deterministic regression fails or the approved model-evaluation threshold is not met."
  - "Baseline and candidate results are comparable without treating one stochastic run as conclusive."
inventory_notes:
  - "The deterministic six-family baseline and exact comparison gate were completed locally in workflow 2026-07-24-v0-6-eval-deterministic."
  - "Token cost belongs to framework release validation, not to the default downstream upgrade path."
  - "Full model evaluation may use representative sampling after deterministic coverage establishes the complete structural baseline."
  - "The release-side evaluation used gpt-5.6-terra for two fresh candidates and one independent judge over four representative cases; exact outputs, hashes, and the 8/8 plus 8/8 judgment are retained."
  - "The provider did not expose exact token telemetry. Each call was instructed to stay within 4,000 generated tokens; retained output sizes are recorded without presenting byte or word counts as provider token usage."
