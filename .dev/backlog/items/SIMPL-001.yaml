resolution_ref: ".dev/workflows/2026-07-24-v0-6-context-load-simplification/reports/measurement-report.md"
decision_needed: "Resolved: five representative session families and all seven candidates were independently verified. Any historical archive implementation still requires a separately approved v0.7.0 successor item."
acceptance:
  - "Measure context actually loaded by representative runtime, skill-routing, release, handoff, and development sessions; repository word count alone is not treated as token cost."
  - "Disposition every Fable 5 simplification candidate as implement, merge into an owning item, defer to a named horizon, retain, or reject."
  - "Active-context deletion occurs only after the retained rule has a mechanical validator, a routed on-demand source, or explicit evidence that the content is redundant."
  - "Language, wrapper, and skill-family candidates remain coordinated with LANG-001, ENF-001, SAG-001, EVAL-001, and SKILL-001."
  - "Standards simplification remains owned by STD-001, retains an unassigned release target during deliberation, and may become an independent release."
  - "v0.6.0 may reduce default discovery of completed history while keeping workflow and assessment artifacts at their stable paths."
  - "Historical artifacts are not moved, deleted, reduced to Git-only recovery, or replaced by summaries unless a v0.7.0 successor proves measurable benefit and satisfies the archive preconditions."
archive_rationale:
  - "The Fable 5 corpus word count measures repository text, not text automatically loaded into each agent prompt; completed workflows and assessments are normally reached through indexes or explicit evidence lookup."
  - "The v0.4.2 publication incident required historical workflow, assessment, commit, tag, and run evidence to distinguish correct package publication from false finalization claims."
  - "Current backlog, assessment, workflow, release, and Git-search contracts rely on stable artifact paths. Moving or deleting history without redirects and validation would break reproducibility and durable references."
  - "An archive branch or Git history alone is a weaker operational evidence interface for fresh agents and external reviewers because discovery, path resolution, and bounded evidence loading become non-deterministic."
  - "v0.5.0 mechanical safeguards and v0.6.0 context-load measurements must establish what is actually costly before accepting archive risk."
archive_preconditions:
  target_horizon: "v0.7.0-conditional"
  required_evidence:
    - "Measured prompt-load, discovery-noise, checkout-size, or validation-cost benefit that cannot be achieved by indexes and routing alone."
    - "A retention policy identifying which artifact classes remain durable and which may be summarized."
    - "A manifest with immutable identity and digest for every archived artifact."
    - "Stable summaries plus redirect or resolver behavior for existing repository-relative references."
    - "Validator coverage for dangling references, archive inventory completeness, and restore or lookup behavior."
    - "Migration and downstream compatibility evidence before removing any published path."
  prohibited_shortcuts:
    - "Do not use an archive branch or Git history as the sole discoverable record."
    - "Do not delete full evidence merely because an INDEX row or one-page summary exists."
    - "Do not claim token savings from repository word count without actual loaded-context evidence."
inventory_notes:
  - "v0.5.0 owns safety prerequisites and does not implement broad simplification."
  - "v0.6.0 owns measurement and active-context disposition, not automatic deletion."
  - "A separately approved v0.7.0 item must own any historical archive migration."
  - "The clean subject commit measured 1,170 tracked UTF-8 files in the corpus and 38 repository-backed load events across five session families; provider total prompt tokens remained unavailable and were not estimated."
  - "The root AGENTS.md entry was reduced from 2,067 to 1,801 words while retaining safety, routing, approval, upgrade, and validation contracts."
  - "Independent verification found exact Git blob identity and arithmetic parity and no historical workflow, assessment, or evidence deletion."
