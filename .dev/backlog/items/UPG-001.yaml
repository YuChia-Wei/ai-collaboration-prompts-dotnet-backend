resolution_ref: null
decision_needed: "Identify a credible WorkService base commit or approve manual baseline reconciliation, then decide each framework-path difference before recording governed provenance."
acceptance:
  - "The intake starts from a clean committed target and records an explicit rollback commit before any package apply."
  - "The target identifies the closest credible framework base by Git evidence; absent or ambiguous provenance produces an unresolved inventory rather than an automatic classification."
  - "Target-only requirements, specs, ADRs, architecture, operations, domain language, root collaboration truth, and project configuration are classified as protected target truth."
  - "Differences on framework-managed paths are recorded with path, base evidence, reason, owner, and proposed disposition before becoming local_overrides."
  - "The plan compares Base, Incoming, and Target and classifies every relevant path as automatic-candidate, reconcile, or exclude; automatic-candidate is never treated as write authorization."
  - "A target near v0.0.1 follows the manual v0.1.0 and v0.2.0 reconciliation path to establish governed v0.3.0 provenance before using the exact v0.3.0-to-v0.5.0 automatic package route."
  - "Package planning runs dry-run first; acknowledgement preserves or skips target values and never grants overwrite or deletion authority."
  - "Provenance updates only after the target's AI-context and repository gates pass, with accepted differences in local_overrides and unresolved decisions retained under reconciliation.unresolved."
  - "The reusable source-side deliverable is a bounded intake packet or guide; WorkService-specific results remain in WorkService."
inventory_notes:
  - "The v0.5.0 mechanism already protects custom content; this item improves cold-start execution for old or unversioned customized targets rather than inventing a second merge model."
  - "Ordinary target-only artifacts are protected truth but are not local_overrides unless an incoming framework path or contract collides with them."
  - "Directly copying v0.5.0 over a v0.0.1-era target is unsupported and would bypass the provenance and reconciliation gates."
