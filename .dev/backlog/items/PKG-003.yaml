resolution_ref: ".dev/workflows/2026-07-21-v0-5-0-development/evidence/v050-pkg003-validation.md"
decision_needed: "Resolved: schema 2.0 separates clean install from ordered exact sources and selects upgrades by version plus immutable files-manifest SHA-256."
acceptance:
  - "One release can declare multiple governed automatic upgrade sources without ambiguous manifest identity or operation selection."
  - "Each supported source binds an exact immutable files manifest and deterministic operation set."
  - "Real extracted-package upgrades pass from v0.3.0, v0.4.0, and v0.4.1 to the v0.5.0 candidate."
  - "A project whose earliest provenance is v0.0.1 has a documented executable path through v0.3.0 and then either directly to v0.5.0 or through an explicitly required intermediate."
  - "The retained dotnet-mq-arch-lab v0.4.0 target upgrades directly to v0.5.0 with target-owned truth and local overrides preserved."
  - "Clean-install behavior remains supported and independently validated."
inventory_notes:
  - "Migration schema 1.0.0 represents one from identity and cannot express multiple source-specific operation sets."
  - "v0.4.1 intentionally binds only the governed v0.3.0 files manifest to remain patch-compatible."
  - "Existing v0.4.0 consumers should remain on v0.4.0 until this contract is published unless they explicitly choose manual reconciliation."
  - "Schema 1.0 reader compatibility is retained; schema 2.0 writers publish one deterministic operation set per source."
  - "The retained dotnet-mq-arch-lab v0.4.0 target passed in a temporary clone with declared local overrides byte-preserved."
