  - ".dev/workflows/2026-07-18-v0-4-1-downstream-upgrade-remediation/workflow-plan.md#roadmap-reordering-decision"
  - ".ai/distribution/schemas/migration.schema.yaml"
  - ".ai/scripts/ai_context_package.py"
recommended_owner_skill: "ai-context-governance"
handoff_condition: "After v0.4.2 closes, create a dedicated v0.5.0 workflow and obtain explicit SemVer/schema approval before implementing the multi-source public migration contract."
