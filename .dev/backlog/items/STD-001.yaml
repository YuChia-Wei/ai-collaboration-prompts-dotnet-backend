  - ".dev/assessments/ASM-20260720-001/evidence/fable5-v0.4.2/06-simplification-plan.md"
  - ".dev/backlog/items/SIMPL-001.yaml"
recommended_owner_skill: "ai-context-governance"
handoff_condition: "Create a dedicated deliberation workflow when the owner selects the first standards topic. Do not assign a release or edit canonical standards until bounded external discussions have been normalized and reviewed."
workflow_refs:
  - ".dev/workflows/2026-07-20-simplification-roadmap-intake/workflow.yaml"
task_refs:
  - ".dev/workflows/2026-07-20-simplification-roadmap-intake/tasks/SIMPLPLAN-001.json"
resolution_ref: null
decision_needed: "After topic-by-topic ChatGPT and optional Fable 5 discussions are normalized, approve the standards boundaries, validator obligations, migration impact, and whether the work receives a dedicated release."
acceptance:
  - "Each discussion round uses a versioned packet that pins repository, branch, full commit, topic, included files, exclusions, known invariants, decision questions, and expected feedback."
  - "Discussion packets are bounded by one standards concern or coherent family so ChatGPT or another external model can reason without loading the complete standards corpus."
  - "The same packet can be used in ChatGPT chat/work-style conversations or with Fable 5 without relying on hidden conversation state or provider-specific formatting."
  - "The final external response records assumptions, proposed retains/removals/moves, validator consequences, compatibility risks, unresolved questions, and a concise decision ledger when the reviewer can provide them."
  - "Raw external feedback is preserved verbatim and normalized through the assessment external-review intake before any claim becomes backlog, workflow, policy, or release evidence."
  - "No external conversation directly authorizes edits to canonical standards; the repository owner selects normalized findings before implementation."
  - "The deliberation explicitly distinguishes normative rules, examples, long explanations, validator-backed constraints, human guidance, and target-specific doctrine."
  - "Version assignment occurs only after the discussion scope and migration risk are understood. The result may be a dedicated release rather than part of v0.6.0."
discussion_roundtrip:
  guide: ".dev/guides/ai-collaboration-guides/EXTERNAL-AI-DISCUSSION-ROUNDTRIP-GUIDE.md"
  outbound_owner: "the dedicated STD-001 deliberation workflow"
  inbound_owner: "a repo-native assessment created by the receiving agent"
  supported_reviewers:
    - "ChatGPT chat or work-style conversation"
    - "Claude Fable 5 or another independent AI reviewer"
    - "repository-native agent discussion"
  canonicalization_boundary: "Only selected normalized assessment findings may enter a remediation workflow."
versioning_posture:
  current: "unassigned"
  earliest_dependency: "Complete or stabilize the v0.5.0 mechanical governance safeguards."
  v0_6_relationship: "SIMPL-001 may measure and disposition standards candidates but must not assume implementation in v0.6.0."
  dedicated_release_option: "Preferred when the accepted standards changes materially affect development doctrine, prompt routing, validators, examples, or downstream migration."
inventory_notes:
  - "Standards are a core product surface of this AI context framework, not incidental token cleanup."
  - "Discussion depth and correctness take precedence over fitting the work into a preselected release."
