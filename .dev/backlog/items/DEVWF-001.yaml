decision_needed: "Decide whether issue linkage belongs in the portable task schema, a capability profile, or target-local extension, and which lifecycle timestamps are authoritative enough to validate."
acceptance:
  - "The decision distinguishes a human issue number from workflow_id, task_id, commit scope, and external tracker URL."
  - "Repositories without an issue tracker remain fully valid; missing issue numbers never require fabricated no-issue identities."
  - "If adopted, issue references support target-defined tracker types and stable identifiers without embedding WorkService-specific field names in the portable core."
  - "The timeline decision evaluates created_at, started_at, completed_at, last_validated_at, updated_at, and timezone or offset semantics against the existing lifecycle state machine."
  - "Timestamp ownership and transition rules prevent inferred or contradictory times; Git commit time and file modification time are not silently substituted."
  - "Template versioning, backward compatibility, validators, examples, output contracts, and runtime wrappers are updated together for any accepted schema change."
  - "The existing execution.commit_checkpoint, results.commits, and results.validation_evidence contracts remain intact."
  - "The richer WorkService review-report structure is separately dispositioned as adopt, retain target-local, or defer rather than bundled implicitly."
inventory_notes:
  - "The current portable task template already carries created_at and updated_at plus structural commit and validation evidence."
  - "The root commit policy already accepts issue-number subjects when an issue exists, so this item concerns artifact traceability rather than commit syntax."
  - "The WorkService report is attributed evidence; its private repository facts were not reproduced in this source workspace."
