decision_needed: "Choose the v0.6.0 component model and defaults: one versioned componentized release is recommended, with mandatory software-delivery and AI-context lifecycle cores, a dotnet-backend profile, and an optional repository-backlog provider."
product_layers:
  mandatory_software_delivery:
    - "requirements, specifications, problem framing, DDD and architecture, test design, implementation, review, compliance, and workflow closeout"
    - ".dev/workflows/ governance and target execution artifacts"
  mandatory_ai_context_lifecycle:
    - "initialization, audit, target-facing governance, upgrade, provenance, customization reconciliation, and post-upgrade verification"
  optional_providers:
    - "repository backlog"
    - "future external tracker integrations"
  source_only:
    - "package builders and source release tests"
    - "source release registry and publication/finalization operations"
    - "source workflow, assessment, backlog, and release instances"
acceptance:
  - "A canonical capability matrix classifies every distributed surface as mandatory core, selected technology profile, optional provider, target-owned seed, or source-only."
  - "The mandatory software-delivery core preserves requirements, specification, problem framing, DDD and architecture, test design, implementation, review, compliance validation, and .dev/workflows/ lifecycle capability."
  - "The mandatory AI-context lifecycle core preserves initialization, auditor, target-facing governance, upgrader, provenance, customization reconciliation, and independent post-upgrade verification."
  - "Repository backlog storage is an optional provider; software-development workflows remain valid when Azure DevOps, Jira, GitHub Issues/Projects, another tracker, or no durable backlog provider is selected."
  - "The selected component model declares dependency direction: an optional backlog provider may reference workflow identities, while workflow execution does not depend on repository backlog installation."
  - "Clean-install defaults, target selection records, upgrade preservation, acknowledgement semantics, and removal behavior are explicit and deterministic."
  - "Existing v0.5.0 targets preserve target-owned backlog and workflow data; reclassification never grants automatic deletion authority."
  - "The package and migration schemas record enough component identity to reproduce, validate, and upgrade an installation without treating optional providers as implicit."
  - "Downstream fixtures prove each supported core/profile/provider combination and exclude source-only release operations."
  - "CI-001 and CI-002 enforce the approved release and component matrix without coupling general governance checks to a concrete release phase."
  - "SIMPL-001 measures the approved product surfaces and cannot remove either mandatory core pillar merely because recent source work emphasized self-governance."
  - "Future package-registry distribution remains deferred exploration and does not block v0.6.0."
inventory_notes:
  - "The current source has one broad dotnet-backend profile rather than a declared component/provider model."
  - "The current profile packages backlog governance and seeds a target backlog index even though the owner has classified repository backlog as optional."
  - "The existing deterministic zip and tar.gz release identity remains the v0.6.0 baseline until a separately approved registry-distribution item exists."
