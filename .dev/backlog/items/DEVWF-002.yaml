test_execution_contract:
  capability: "test-execution"
  dedicated_skill: "deferred"
  default_levels:
    - "unit"
    - "integration"
  conditional_levels:
    - "e2e"
    - "browser"
    - "playwright"
    - "environment-dependent"
  outcomes:
    - "passed"
    - "failed"
    - "blocked-by-environment"
    - "not-applicable"
    - "deferred-with-owner"
spec_compliance_contract:
  selection: "optional"
  activation: "explicit target profile, problem-frame workflow, requirement, or owner decision"
  selected_gate: "100-percent-fail-closed"
  absent_selection: "not-applicable"
commit_density_contract:
  default: "one validated commit per durable stage or coherent bounded batch"
  prohibit: "one commit per skill invocation"
  compression: "combine small tasks completed and validated together; allow fixup or squash only on unshared, unpushed history under the active repository policy"
  preserve:
    - "approved source-of-truth baselines"
    - "externally referenced evidence commits"
    - "shared or pushed history"
    - "explicit checkpoint and handoff commits"
acceptance:
  - "A high-level multi-stage software-development request activates the orchestrator without requiring the user to name dev-workflow, software-development-orchestrator, or downstream skills."
  - "The orchestrator maps intent to capability slots and resolves the active profile or discovery contract with recorded confidence; it does not infer stages from skill names alone."
  - "A long requirement, design, or specification discussion pauses for approval and does not create or execute implementation work before authorization."
  - "Each approved, durable, and validated stage or coherent bounded batch has a commit checkpoint under the existing Git commit policy; repeated calls to one skill do not create mechanical per-invocation commits."
  - "Small tasks completed and validated together may share one commit, and any history compression is limited to unshared, unpushed commits without destroying approval, review, handoff, or evidence boundaries."
  - "The test-execution capability resolves target-owned commands, working directory, prerequisites, and policy without inventing credentials, bypassing enterprise controls, or escalating privileges implicitly."
  - "Unit and integration tests are the default development levels; blocked-by-environment is recorded as blocked and never counted as passed."
  - "E2E, browser, Playwright, deployment-dependent, and other specialized tests are conditional capabilities; if requirements or target policy make one mandatory, closeout pauses until it has a valid outcome."
  - "No dedicated test-execution skill is required for v0.6.0; a target profile may use repository commands, a fallback contract, or a separately evaluated external skill."
  - "Spec compliance is selectable. Without explicit activation it is not applicable; after activation, partial configuration or less than 100 percent coverage fails closed."
  - "Closeout checks approved requirements and specs, implementation completion, required test outcomes, selected compliance gates, review disposition, validation evidence, task state, and commit evidence separately."
  - "A fresh session can resume from Git, workflow artifacts, target policy, and recorded test state without hidden conversation context."
inventory_notes:
  - "v0.0.2 is the first tagged portable dev-workflow baseline supplied by the owner; v0.0.3 adds the capability-based routing generation."
  - "The current profile has deterministic downstream mappings but no generic test-execution slot."
  - "Current active documents conflict on spec compliance: some make it universally mandatory while runner history treats absent inputs as not applicable. v0.6.0 must normalize the selected conditional gate."
  - "DEVWF-001 remains independent optional issue and timeline metadata work and is not replaced by this product gate."
